<script>
  // Firebase Configuration for PLP Laundromat
  const firebaseConfig = {
    apiKey: "AIzaSyDGTH_hCsA7SyrmCCOcnCBPm_wcKvplSW8",
    authDomain: "plp-laundromat.firebaseapp.com",
    projectId: "plp-laundromat",
    storageBucket: "plp-laundromat.firebasestorage.app",
    messagingSenderId: "1012941920819",
    appId: "1:1012941920819:web:bb0c7c300d0111b83a6146"
  };
  firebase.initializeApp(firebaseConfig);
  window.db = firebase.firestore();
  
  // App version marker - bump เพื่อ force ล้าง bad pending writes
  window.APP_VERSION = 'v12-2026-04-28';
  
  // ล้าง bad pending writes จาก version เก่า (ที่อาจมี undefined ค้าง)
  (async function clearStaleQueue() {
    try {
      const lastVersion = localStorage.getItem('app-version');
      if (lastVersion !== window.APP_VERSION) {
        // ปิด persistence เพื่อล้าง pending writes
        try {
          await window.db.terminate();
        } catch (e) {}
        try {
          await window.db.clearPersistence();
          console.log('✓ Cleared stale Firestore cache');
        } catch (e) {
          console.log('clearPersistence skipped:', e.message);
        }
        // Re-initialize Firestore
        window.db = firebase.firestore();
        localStorage.setItem('app-version', window.APP_VERSION);
      }
      // Enable persistence ใหม่
      window.db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
    } catch (e) {
      console.error('queue cleanup error:', e);
      // Fallback: ใช้แบบเดิม
      window.db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
    }
  })();
</script>

<script>
  // ตรวจจับ Line browser
  (function() {
    const ua = navigator.userAgent.toLowerCase();
    const isLine = ua.includes('line/');
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    if (isLine && !isStandalone) {
      document.getElementById('line-warning').style.display = 'block';
    }

    // iOS Safari (ไม่ใช่ Line, ยังไม่ได้ติดตั้ง)
    const isIOS = /iphone|ipad|ipod/.test(ua);
    const isSafari = /safari/.test(ua) && !/crios|fxios/.test(ua);
    if (isIOS && isSafari && !isStandalone && !isLine) {
      const dismissed = localStorage.getItem('ios-install-dismissed');
      if (!dismissed) {
        setTimeout(() => {
          document.getElementById('ios-install').style.display = 'block';
        }, 5000);
      }
    }
  })();

  // ก๊อปลิงก์
  function copyLink() {
    const url = window.location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => {
        alert('✓ ก๊อปลิงก์แล้ว!\n\nไปวางใน Chrome / Safari ได้เลย');
      }).catch(() => fallbackCopy(url));
    } else {
      fallbackCopy(url);
    }
  }
  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      alert('✓ ก๊อปลิงก์แล้ว!');
    } catch {
      prompt('ก๊อปลิงก์นี้:', text);
    }
    document.body.removeChild(ta);
  }

  // PWA Install prompt (Android Chrome)
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const dismissed = localStorage.getItem('install-dismissed');
    const installed = window.matchMedia('(display-mode: standalone)').matches;
    if (!dismissed && !installed) {
      setTimeout(() => {
        document.getElementById('install-prompt').style.display = 'block';
      }, 5000);
    }
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-prompt').style.display = 'none';
      });
    }
  }

  function dismissInstall() {
    document.getElementById('install-prompt').style.display = 'none';
    document.getElementById('ios-install').style.display = 'none';
    localStorage.setItem('install-dismissed', '1');
    localStorage.setItem('ios-install-dismissed', '1');
  }

  // Register Service Worker (ทำงานออฟไลน์ + ติดตั้งเป็นแอปได้)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then((reg) => {
        // เช็คอัพเดตทุก 30 วินาที
        setInterval(() => reg.update().catch(() => {}), 30000);
        // ถ้ามี SW ใหม่ติดตั้งแล้ว → บอกให้ activate ทันที + reload
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // มี version ใหม่พร้อมใช้ — reload ทันทีให้ user เห็นโค้ดใหม่
              window.location.reload();
            }
          });
        });
      }).catch(() => {});
    });
  }
</script>

    if (ref.current) {
      ref.current.innerHTML = '';
      const svg = document.createElement('i');
      svg.setAttribute('data-lucide', name);
      ref.current.appendChild(svg);
      window.lucide.createIcons({ attrs: { 'stroke-width': strokeWidth } });
    }
  }, [name, strokeWidth]);
  return <span ref={ref} className={className + " inline-flex"}></span>;
};

// ============ FIRESTORE HELPERS ============
// เก็บข้อมูลใน cloud (Firebase Firestore) — ทุกมือถือเห็นข้อมูลเดียวกัน
async function loadOrdersFromCloud(brand) {
  try {
    const snapshot = await window.db.collection('orders').where('brand', '==', brand).get();
    return snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) {
    console.error('loadOrders error:', e);
    return [];
  }
}
// Helper: ลบ undefined values ทุก nested level
function cleanUndefined(obj) {
  if (obj === null || obj === undefined) return null;
  if (Array.isArray(obj)) {
    return obj.map(cleanUndefined).filter(v => v !== undefined);
  }
  if (typeof obj === 'object') {
    // Handle Firestore Timestamp / Date objects
    if (obj instanceof Date) return obj.getTime();
    const cleaned = {};
    for (const key of Object.keys(obj)) {
      const val = obj[key];
      if (val === undefined) continue;
      const cleanedVal = cleanUndefined(val);
      if (cleanedVal !== undefined) {
        cleaned[key] = cleanedVal;
      }
    }
    return cleaned;
  }
  // Skip functions and symbols (Firestore doesn't support them)
  if (typeof obj === 'function' || typeof obj === 'symbol') return null;
  return obj;
}

// ตรวจว่าเป็น Firestore auto-id (20 ตัว alphanumeric, ไม่มี dash)
function isFirestoreId(id) {
  return typeof id === 'string' && id.length === 20 && !id.includes('-');
}

async function saveOrderToCloud(brand, order) {
  try {
    let data = { ...order, brand };
    delete data.id;
    // Layer 1: Clean undefined recursively
    data = cleanUndefined(data);
    // Layer 2: JSON round-trip — JSON.stringify skips undefined ตาม spec
    // ทำให้รับประกันว่าไม่มี undefined แม้จะมี edge case
    data = JSON.parse(JSON.stringify(data));
    
    if (isFirestoreId(order.id)) {
      // มี Firestore id → update doc เดิม (merge เพื่อกัน race condition)
      await window.db.collection('orders').doc(order.id).set(data, { merge: true });
      return order.id;
    }
    // ไม่มี id หรือเป็น local id → สร้าง doc ใหม่ใน Firestore
    const docRef = await window.db.collection('orders').add(data);
    return docRef.id;
  } catch (e) {
    console.error('saveOrder error:', e);
    throw e;
  }
}
async function deleteOrderFromCloud(orderId) {
  try { await window.db.collection('orders').doc(orderId).delete(); }
  catch (e) { console.error('deleteOrder error:', e); throw e; }
}
async function loadCollectionsFromCloud(brand) {
  try {
    const snapshot = await window.db.collection('collections').where('brand', '==', brand).get();
    return snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) {
    console.error('loadCollections error:', e);
    return [];
  }
}
async function saveCollectionToCloud(brand, item) {
  try {
    let data = { ...item, brand };
    delete data.id;
    data = cleanUndefined(data);
    data = JSON.parse(JSON.stringify(data));
    await window.db.collection('collections').add(data);
  } catch (e) { console.error('saveCollection error:', e); throw e; }
}
async function batchUpdateOrders(orderIds, updates) {
  try {
    // Clean undefined values to avoid Firestore errors
    let cleanedUpdates = cleanUndefined(updates);
    cleanedUpdates = JSON.parse(JSON.stringify(cleanedUpdates));
    const batch = window.db.batch();
    orderIds.forEach(id => {
      const ref = window.db.collection('orders').doc(id);
      batch.update(ref, cleanedUpdates);
    });
    await batch.commit();
  } catch (e) { console.error('batchUpdate error:', e); throw e; }
}
// Subscribe — real-time updates
function subscribeToOrders(brand, callback) {
  return window.db.collection('orders').where('brand', '==', brand).onSnapshot(
    snapshot => {
      const orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      callback(orders);
    },
    error => console.error('subscribe orders error:', error)
  );
}
function subscribeToCollections(brand, callback) {
  return window.db.collection('collections').where('brand', '==', brand).onSnapshot(
    snapshot => {
      const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      callback(items);
    },
    error => console.error('subscribe collections error:', error)
  );
}

// ============ PROMOTION LOGIC ============
function checkPromotion(timestamp) {
  const d = new Date(timestamp);
  const day = d.getDay();
  const hour = d.getHours();
  const isWednesday = (day === 3);
  const isMidnightWeekday = (day >= 1 && day <= 5) && (hour >= 0 && hour < 6);
  
  if (isWednesday && isMidnightWeekday) {
    return { active: true, type: 'wednesday_midnight', label: '🐻🌙 พุธ + ดึกสุดคุ้ม', shortLabel: 'พุธดึก', discountPerWash: 10 };
  }
  if (isWednesday) {
    return { active: true, type: 'wednesday', label: '🐻 พุธสุดคุ้ม', shortLabel: 'พุธ', discountPerWash: 10 };
  }
  if (isMidnightWeekday) {
    return { active: true, type: 'midnight', label: '🌙 ดึกสุดคุ้ม (จ-ศ ตี 0-6)', shortLabel: 'ดึก', discountPerWash: 10 };
  }
  return { active: false, type: null, label: '', discountPerWash: 0 };
}

// ============ CALCULATE BREAKDOWN ============
function calculateBreakdown(order, config) {
  const promo = checkPromotion(order.createdAt || Date.now());
  
  let washSubtotal = 0;
  let washCount = 0;
  (order.washItems || []).forEach(item => {
    const m = config.washMachines.find(w => w.size === item.size);
    if (m) {
      const price = m.prices[item.temp || 'cold'];
      washSubtotal += price * item.qty;
      washCount += item.qty;
    }
  });
  
  let drySubtotal = 0;
  let dryTopUpTotal = 0;
  (order.dryItems || []).forEach(item => {
    const m = config.dryMachines.find(d => d.size === item.size);
    if (m) drySubtotal += m.price * item.qty;
    // หยอดเพิ่ม (top-up) — เพิ่มเวลาอบ ทีละ 10 บาท
    dryTopUpTotal += (item.topUp || 0);
  });
  
  const detergentTotal = (order.detergentQty || 0) * config.detergentPrice;
  const softenerTotal = (order.softenerQty || 0) * config.softenerPrice;
  const foldTotal = (order.foldBaskets || 0) * config.foldPricePerBasket;
  const serviceTotal = config.freeService ? 0 : (order.useService !== false ? config.servicePrice : 0);
  
  // Delivery (Teddy only)
  let deliveryTotal = 0;
  if (config.hasDelivery && order.deliveryZone) {
    const zone = config.deliveryZones.find(z => z.id === order.deliveryZone);
    if (zone) deliveryTotal = zone.price;
  }
  
  // Promotion discount (per wash tank)
  const promoDiscount = promo.active ? promo.discountPerWash * washCount : 0;
  
  // Line promo (Teddy only) — only for in-store (no delivery)
  let lineDiscount = 0;
  if (config.hasLinePromo && order.useLinePromo && !order.deliveryZone) {
    // ลดได้ไม่เกินค่าซัก
    const remainingWash = washSubtotal - promoDiscount;
    lineDiscount = Math.min(config.linePromoDiscount, Math.max(0, remainingWash));
  }
  
  const subtotal = washSubtotal + drySubtotal + dryTopUpTotal + detergentTotal + softenerTotal + foldTotal + serviceTotal + deliveryTotal;
  const totalDiscount = promoDiscount + lineDiscount;
  const total = Math.max(0, subtotal - totalDiscount);
  
  return {
    promo,
    washSubtotal, washCount, drySubtotal, dryTopUpTotal,
    detergentTotal, softenerTotal, foldTotal, serviceTotal, deliveryTotal,
    promoDiscount, lineDiscount, totalDiscount,
    subtotal, total,
  };
}

const calculateTotal = (order, config) => calculateBreakdown(order, config).total;

    setSyncStatus('connecting');

      setOrders(newOrders.sort((a, b) => b.createdAt - a.createdAt));
      setSyncStatus('synced');
    });
    const unsubCollections = subscribeToCollections(config.brand, (newCollections) => {
      setCollections(newCollections.sort((a, b) => b.collectedAt - a.collectedAt));

      await saveCollectionToCloud(config.brand, round);

              <button key={o.id} onClick={() => onSelectOrder(o)} className="w-full bg-white rounded-2xl p-4 border border-slate-100 active:scale-95 transition flex items-center gap-3 text-left">
                <div className={`w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 ${o.collected ? 'bg-emerald-50' : (o.paymentMethod === 'transfer' ? 'bg-violet-50' : 'bg-sky-50')}`}>
                  <Icon name={o.collected ? "check" : (o.deliveryZone ? 'truck' : (o.paymentMethod === 'transfer' ? 'smartphone' : 'banknote'))} className={`w-6 h-6 ${o.collected ? 'text-emerald-500' : (o.paymentMethod === 'transfer' ? 'text-violet-500' : 'text-sky-500')}`} strokeWidth={o.collected ? 3 : 2} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <p className="font-semibold text-slate-900 truncate">{o.customerName}</p>
                    {o.deliveryZone && <span className="text-xs px-1.5 py-0.5 rounded-full bg-orange-100 text-orange-700 font-bold">🚚</span>}
                    {o.fromKev && <span className="text-xs px-1.5 py-0.5 rounded-full bg-purple-100 text-purple-700 font-bold">เคฟ</span>}
                    {o.fromLine && <span className="text-xs px-1.5 py-0.5 rounded-full bg-green-100 text-green-700 font-bold">💬</span>}
                    {(o.dryItems || []).some(d => d.topUp > 0) && <span className="text-xs px-1.5 py-0.5 rounded-full bg-amber-100 text-amber-700 font-bold">⏱️</span>}
                  </div>
                  <p className="text-xs text-slate-500">{formatDate(o.createdAt)}</p>
                </div>
                <div className="text-right">
                  <p className="font-bold text-slate-900">฿{formatMoney(calculateTotal(o, config))}</p>
                  <p className={`text-xs font-medium ${o.collected ? 'text-emerald-600' : (o.paymentMethod === 'transfer' ? 'text-violet-600' : 'text-amber-600')}`}>
                    {o.collected ? 'เก็บแล้ว' : (o.paymentMethod === 'transfer' ? 'โอน' : 'เงินสด')}
                  </p>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function NewOrderView({ config, onCancel, onSubmit, editingOrder }) {
  const isEdit = !!editingOrder;
  const [name, setName] = useState(editingOrder?.customerName || '');
  const [phone, setPhone] = useState(editingOrder?.customerPhone || '');
  const [basketPhoto, setBasketPhoto] = useState(editingOrder?.basketPhoto || '');
  const [moneyPhoto, setMoneyPhoto] = useState(editingOrder?.moneyPhoto || '');
  const [linePromoPhoto, setLinePromoPhoto] = useState(editingOrder?.linePromoPhoto || '');
  const [clothCount, setClothCount] = useState(editingOrder?.clothCount || '');
  const [washItems, setWashItems] = useState(editingOrder?.washItems || []);
  const [dryItems, setDryItems] = useState(editingOrder?.dryItems || []);
  const [detergentQty, setDetergentQty] = useState(editingOrder?.detergentQty || 0);
  const [softenerQty, setSoftenerQty] = useState(editingOrder?.softenerQty || 0);
  const [foldBaskets, setFoldBaskets] = useState(editingOrder?.foldBaskets ?? (config.freeService ? 0 : 1));
  const [useService, setUseService] = useState(editingOrder?.useService ?? true);
  const [paymentMethod, setPaymentMethod] = useState(editingOrder?.paymentMethod || 'cash');
  const [note, setNote] = useState(editingOrder?.note || '');
  const [deliveryZone, setDeliveryZone] = useState(editingOrder?.deliveryZone || null);
  const [fromKev, setFromKev] = useState(editingOrder?.fromKev || false);
  const [fromLine, setFromLine] = useState(editingOrder?.fromLine || false);
  const [useLinePromo, setUseLinePromo] = useState(editingOrder?.useLinePromo || false);

  const basketInputRef = useRef(null);
  const moneyInputRef = useRef(null);
  const linePromoInputRef = useRef(null);

  const handlePhotoUpload = (e, setter) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        // ย่อรูปเป็น 600px กว้าง — เก็บใน Firestore ได้ (~50KB)
        const ratio = Math.min(1, 600 / img.width);
        canvas.width = img.width * ratio; canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        // คุณภาพ 0.6 = ~50KB
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
        // เช็คขนาด (Firestore document max 1MB)
        const sizeKB = Math.round(dataUrl.length / 1024);
        if (sizeKB > 700) {
          // ถ้ายังใหญ่ ย่อลงอีก
          const ratio2 = Math.min(1, 400 / canvas.width);
          canvas.width = canvas.width * ratio2;
          canvas.height = canvas.height * ratio2;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          setter(canvas.toDataURL('image/jpeg', 0.5));
        } else {
          setter(dataUrl);
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const updateItem = (list, setter, size, delta, temp) => {
    setter(prev => {
      const existing = prev.find(i => i.size === size && (i.temp || 'cold') === (temp || 'cold'));
      if (existing) {
        const newQty = existing.qty + delta;
        if (newQty <= 0) return prev.filter(i => !(i.size === size && (i.temp || 'cold') === (temp || 'cold')));
        return prev.map(i => (i.size === size && (i.temp || 'cold') === (temp || 'cold')) ? { ...i, qty: newQty } : i);
      }
      if (delta > 0) return [...prev, { size, qty: 1, temp: temp || 'cold' }];
      return prev;
    });
  };

  const getQty = (list, size, temp) => list.find(i => i.size === size && (i.temp || 'cold') === (temp || 'cold'))?.qty || 0;

  // หยอดเพิ่ม (top-up) สำหรับเครื่องอบ — ทีละ 10 บาท
  const getTopUp = (size) => {
    const item = dryItems.find(i => i.size === size);
    return item?.topUp || 0;
  };

  const updateTopUp = (size, delta) => {
    setDryItems(prev => {
      const existing = prev.find(i => i.size === size);
      if (!existing) return prev; // ต้องเลือกเครื่องอบก่อน
      const newTopUp = Math.max(0, (existing.topUp || 0) + delta);
      return prev.map(i => i.size === size ? { ...i, topUp: newTopUp } : i);
    });
  };

  const orderTime = editingOrder?.createdAt || Date.now();
  const tempOrder = { 
    washItems, dryItems, detergentQty, softenerQty, foldBaskets, useService,
    deliveryZone, useLinePromo,
    createdAt: orderTime,
  };
  const breakdown = calculateBreakdown(tempOrder, config);
  const total = breakdown.total;
  const canSubmit = (washItems.length > 0 || dryItems.length > 0) && (!useLinePromo || linePromoPhoto);

  const hasMultipleTemps = config.washMachines.some(m => m.prices.cold !== m.prices.warm);

  // Auto turn off line promo when delivery is selected
  useEffect(() => {
    if (deliveryZone && useLinePromo) {
      setUseLinePromo(false);
      setLinePromoPhoto('');
    }
  }, [deliveryZone]);

  // เคฟ ↔ Line ใช้ร่วมกันไม่ได้: ถ้าติ๊กเคฟ → ปิด Line อัตโนมัติ
  useEffect(() => {
    if (fromKev && fromLine) {
      setFromLine(false);
    }
  }, [fromKev]);

  const handleSubmit = () => {
    if (washItems.length === 0 && dryItems.length === 0) {
      alert('เลือกบริการอย่างน้อย 1 รายการ');
      return;
    }
    if (useLinePromo && !linePromoPhoto) {
      alert('กรุณาถ่ายรูปคูปองส่วนลดแอดไลน์ก่อน');
      return;
    }
    const order = {
      id: editingOrder?.id || generateId(),
      createdAt: editingOrder?.createdAt || Date.now(),
      updatedAt: Date.now(),
      customerName: name.trim() || '(ไม่ระบุชื่อ)',
      customerPhone: phone.trim() || '',
      basketPhoto: basketPhoto || '',
      moneyPhoto: moneyPhoto || '',
      linePromoPhoto: linePromoPhoto || '',
      clothCount: clothCount.trim() || '',
      washItems: washItems || [],
      dryItems: dryItems || [],
      detergentQty: detergentQty || 0,
      softenerQty: softenerQty || 0,
      foldBaskets: foldBaskets || 0,
      useService: useService === undefined ? true : useService,
      paymentMethod: paymentMethod || 'cash',
      cashReceived: total,
      note: note.trim() || '',
      deliveryZone: deliveryZone || null,
      fromKev: fromKev || false,
      fromLine: fromLine || false,
      useLinePromo: useLinePromo || false,
      collected: editingOrder?.collected || false,
      collectedAt: editingOrder?.collectedAt || null,
    };
    onSubmit(order);
  };

  return (
    <div className="min-h-screen pb-32">
      <div className="sticky z-20 bg-white border-b border-slate-100 px-5 py-3 flex items-center gap-3" style={{top: '0px'}}>
        <button onClick={onCancel} className="flex items-center gap-1 px-3 py-2 -ml-2 rounded-xl active:scale-95 active:bg-slate-100 transition">
          <Icon name="chevron-left" className="w-6 h-6 text-slate-700" />
          <span className="text-sm font-bold text-slate-700">กลับ</span>
        </button>
        <div className="flex-1">
          <h1 className="font-bold text-slate-900 text-lg">{isEdit ? 'แก้ไขรายการ' : 'รับงานใหม่'}</h1>
          <p className="text-xs text-slate-500">{config.name} • {config.freeService ? 'ฟรีค่าฝากซัก-อบ-พับ' : 'ฝาก ซัก อบ พับ'}</p>
        </div>
      </div>

      <div className="px-5 py-5 space-y-5">
        {breakdown.promo.active && (
          <div className="rounded-2xl p-4 shadow-lg" style={{background: breakdown.promo.type === 'wednesday_midnight' ? 'linear-gradient(135deg, #8B5CF6, #EC4899)' : breakdown.promo.type === 'wednesday' ? 'linear-gradient(135deg, #10B981, #059669)' : 'linear-gradient(135deg, #6366F1, #8B5CF6)'}}>
            <div className="flex items-center gap-3">
              <div className="text-3xl">{breakdown.promo.type === 'wednesday' ? '🐻' : breakdown.promo.type === 'midnight' ? '🌙' : '🎉'}</div>
              <div className="flex-1">
                <p className="text-white font-extrabold text-base">{breakdown.promo.label}</p>
                <p className="text-white text-xs opacity-90">ลดอัตโนมัติ 10 บาท / ถัง สำหรับเครื่องซักทุกขนาด</p>
              </div>
            </div>
          </div>
        )}

        {config.hasKev && (
          <button 
            onClick={() => setFromKev(!fromKev)} 
            className={`w-full rounded-2xl p-4 shadow-lg transition active:scale-[0.98] ${fromKev ? 'shadow-purple-300' : ''}`}
            style={fromKev ? {background: 'linear-gradient(135deg, #A855F7, #7C3AED)'} : {background: 'white', border: '2px dashed #C084FC'}}
          >
            <div className="flex items-center gap-3">
              <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0 ${fromKev ? 'bg-white bg-opacity-25' : 'bg-purple-50'}`}>
                {fromKev ? '✓' : '👨‍💼'}
              </div>
              <div className="flex-1 text-left">
                <p className={`font-extrabold text-base ${fromKev ? 'text-white' : 'text-purple-700'}`}>
                  {fromKev ? '✓ งานนี้จากเคฟ' : '👨‍💼 งานนี้จากเคฟ?'}
                </p>
                <p className={`text-xs ${fromKev ? 'text-purple-100' : 'text-slate-500'}`}>
                  {fromKev ? 'แตะอีกครั้งเพื่อยกเลิก' : 'แตะเพื่อติ๊กก่อน แล้วค่อยกรอกข้อมูลลูกค้า'}
                </p>
              </div>
              <div className={`w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 ${fromKev ? 'bg-white' : 'bg-white border-2 border-purple-300'}`}>
                {fromKev && <Icon name="check" className="w-4 h-4 text-purple-600" strokeWidth={4} />}
              </div>
            </div>
          </button>
        )}

        {/* ปุ่มงานจาก Line - ใช้ได้ทั้ง Otteri และ Teddy (ใช้ร่วมกับเคฟไม่ได้) */}
        <button 
          onClick={() => !fromKev && setFromLine(!fromLine)}
          disabled={fromKev}
          className={`w-full rounded-2xl p-4 shadow-lg transition ${fromKev ? 'opacity-40 cursor-not-allowed' : 'active:scale-[0.98]'} ${fromLine ? 'shadow-green-300' : ''}`}
          style={fromLine ? {background: 'linear-gradient(135deg, #06C755, #00B900)'} : {background: 'white', border: '2px dashed #86EFAC'}}
        >
          <div className="flex items-center gap-3">
            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0 ${fromLine ? 'bg-white bg-opacity-25' : 'bg-green-50'}`}>
              {fromLine ? '✓' : '💬'}
            </div>
            <div className="flex-1 text-left">
              <p className={`font-extrabold text-base ${fromLine ? 'text-white' : 'text-green-700'}`}>
                {fromLine ? '✓ งานนี้รับทาง Line' : '💬 งานนี้รับทาง Line?'}
              </p>
              <p className={`text-xs ${fromLine ? 'text-green-100' : 'text-slate-500'}`}>
                {fromKev ? 'ใช้ร่วมกับเคฟไม่ได้' : (fromLine ? 'แตะอีกครั้งเพื่อยกเลิก' : 'ติ๊กถ้าลูกค้าติดต่อมาทาง Line')}
              </p>
            </div>
            <div className={`w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 ${fromLine ? 'bg-white' : 'bg-white border-2 border-green-300'}`}>
              {fromLine && <Icon name="check" className="w-4 h-4 text-green-600" strokeWidth={4} />}
            </div>
          </div>
        </button>


        <Section iconName="user" title="ข้อมูลลูกค้า">
          <Field label="ชื่อลูกค้า">
            <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="ชื่อ-นามสกุล / ชื่อเล่น / ชื่อตึก / หอ" className="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:border-sky-500 focus:bg-white outline-none transition" />
          </Field>
          <Field label="เบอร์โทร">
            <input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="0XX-XXX-XXXX" inputMode="tel" className="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:border-sky-500 focus:bg-white outline-none transition" />
          </Field>
        </Section>

        <Section iconName="camera" title="รูปตะกร้าผ้า">
          <input ref={basketInputRef} type="file" accept="image/*" onChange={(e) => handlePhotoUpload(e, setBasketPhoto)} className="hidden" />
          {basketPhoto ? (
            <div className="relative">
              <img src={basketPhoto} className="w-full rounded-xl" />
              <button onClick={() => setBasketPhoto('')} className="absolute top-2 right-2 bg-rose-500 text-white rounded-full p-2 shadow-lg">
                <Icon name="x" className="w-4 h-4" />
              </button>
            </div>
          ) : (
            <button onClick={() => basketInputRef.current?.click()} className="w-full py-8 bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center gap-2 active:scale-95 transition">
              <Icon name="camera" className="w-8 h-8 text-slate-400" />
              <span className="text-sm text-slate-600 font-medium">ถ่ายรูป / เลือกรูป</span>
            </button>
          )}
          <Field label="จำนวนผ้า (ตัว/ชุด)">
            <input type="text" value={clothCount} onChange={(e) => setClothCount(e.target.value)} placeholder="เช่น 25 ตัว" className="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:border-sky-500 focus:bg-white outline-none transition" />
          </Field>
        </Section>

        <Section iconName="droplet" title="เครื่องซัก">
          <div className="space-y-3">
            {config.washMachines.map(m => (
              <WashMachineRow key={m.size} machine={m} hasMultipleTemps={hasMultipleTemps} getQty={getQty} washItems={washItems} onUpdate={(temp, delta) => updateItem(washItems, setWashItems, m.size, delta, temp)} />
            ))}
          </div>
        </Section>

        <Section iconName="wind" title="เครื่องอบ">
          <div className="space-y-2">
            {config.dryMachines.map(m => {
              const qty = getQty(dryItems, m.size, 'cold');
              const topUp = getTopUp(m.size);
              return (
                <div key={m.size}>
                  <MachineRow size={m.size} count={m.count} price={m.price} qty={qty} onAdd={() => updateItem(dryItems, setDryItems, m.size, 1, 'cold')} onRemove={() => updateItem(dryItems, setDryItems, m.size, -1, 'cold')} color="orange" />
                  {qty > 0 && (
                    <div className="flex items-center justify-between bg-amber-50 border-l-4 border-amber-400 rounded-r-lg pl-3 pr-2 py-2 ml-3 mt-1">
                      <div className="flex items-center gap-2">
                        <span className="text-amber-700 text-sm">⏱️</span>
                        <div>
                          <p className="text-xs font-bold text-amber-800">หยอดเพิ่ม (เพิ่มเวลา)</p>
                          <p className="text-[10px] text-amber-600">ทีละ 10 บาท</p>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => updateTopUp(m.size, -10)} disabled={topUp === 0} className={`w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base transition active:scale-90 ${topUp === 0 ? 'bg-slate-200 text-slate-400' : 'bg-white text-amber-700 border border-amber-300'}`}>−</button>
                        <span className={`min-w-[44px] text-center font-extrabold ${topUp > 0 ? 'text-amber-700' : 'text-slate-400'}`}>{topUp > 0 ? `฿${topUp}` : '฿0'}</span>
                        <button onClick={() => updateTopUp(m.size, 10)} className="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base bg-amber-500 text-white active:scale-90 transition">+</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </Section>

        <Section iconName="sparkles" title="รายการเสริม">
          <CounterRow iconEmoji="🧴" label="น้ำยาซัก" sublabel={`฿${config.detergentPrice} / ซอง`} unit="ซอง" qty={detergentQty} onAdd={() => setDetergentQty(q => q + 1)} onRemove={() => setDetergentQty(q => Math.max(0, q - 1))} colorActive="bg-purple-500" />
          <CounterRow iconEmoji="🌸" label="น้ำยาปรับผ้านุ่ม" sublabel={`฿${config.softenerPrice} / ซอง`} unit="ซอง" qty={softenerQty} onAdd={() => setSoftenerQty(q => q + 1)} onRemove={() => setSoftenerQty(q => Math.max(0, q - 1))} colorActive="bg-pink-500" />
          {!config.freeService && (
            <CounterRow iconEmoji="🧺" label="ค่าพับผ้า" sublabel={`฿${config.foldPricePerBasket} / ตะกร้า`} unit="ตะกร้า" qty={foldBaskets} onAdd={() => setFoldBaskets(q => q + 1)} onRemove={() => setFoldBaskets(q => Math.max(0, q - 1))} colorActive="bg-emerald-500" hint={foldBaskets === 0 ? '⚠️ ไม่คิดค่าพับ' : null} />
          )}
          {config.freeService && (
            <div className="bg-emerald-50 border-2 border-emerald-200 rounded-xl p-3">
              <div className="flex items-center gap-2">
                <span className="text-xl">✨</span>
                <div className="flex-1">
                  <p className="font-bold text-emerald-700 text-sm">ฝาก ซัก อบ พับ - ฟรี!</p>
                  <p className="text-xs text-emerald-600">ไม่คิดค่าบริการเพิ่ม</p>
                </div>
              </div>
            </div>
          )}
        </Section>

        {config.hasDelivery && (
          <Section iconName="truck" title="บริการ Delivery">
            <p className="text-xs text-slate-500 mb-2">ถ้ามีบริการส่งให้เลือกโซนตามแผนที่</p>
            <div className="grid grid-cols-2 gap-2">
              <button onClick={() => setDeliveryZone(null)} className={`p-3 rounded-xl border-2 transition ${!deliveryZone ? 'bg-slate-100 border-slate-400' : 'bg-slate-50 border-transparent'}`}>
                <div className="flex flex-col items-center gap-1">
                  <Icon name="store" className={`w-5 h-5 ${!deliveryZone ? 'text-slate-700' : 'text-slate-400'}`} />
                  <span className={`font-bold text-xs ${!deliveryZone ? 'text-slate-900' : 'text-slate-500'}`}>หน้าร้าน</span>
                  <span className="text-xs text-slate-400">ไม่คิดค่าส่ง</span>
                </div>
              </button>
              {config.deliveryZones.map(z => (
                <button key={z.id} onClick={() => setDeliveryZone(z.id)} className={`p-3 rounded-xl border-2 transition ${deliveryZone === z.id ? 'border-current' : 'bg-slate-50 border-transparent'}`} style={deliveryZone === z.id ? {backgroundColor: z.color + '20', color: z.color} : {}}>
                  <div className="flex flex-col items-center gap-1">
                    <div className="w-4 h-4 rounded-full" style={{backgroundColor: z.color}}></div>
                    <span className={`font-bold text-xs ${deliveryZone === z.id ? '' : 'text-slate-600'}`} style={deliveryZone === z.id ? {color: z.color} : {}}>{z.label}</span>
                    <span className={`text-xs font-bold ${deliveryZone === z.id ? '' : 'text-slate-500'}`} style={deliveryZone === z.id ? {color: z.color} : {}}>฿{z.price}</span>
                  </div>
                </button>
              ))}
            </div>
          </Section>
        )}

        {config.hasLinePromo && !deliveryZone && (
          <Section iconName="tag" title="โปรโมชั่นพิเศษ">
            <button onClick={() => setUseLinePromo(!useLinePromo)} className={`w-full rounded-xl p-3 flex items-start justify-between transition border-2 ${useLinePromo ? 'bg-green-50 border-green-400' : 'bg-slate-50 border-transparent'}`}>
              <div className="flex items-start gap-3">

function ReceiptView({ config, order, onBack }) {
  const receiptRef = useRef(null);
  const [saving, setSaving] = useState(false);
  const breakdown = calculateBreakdown(order, config);
  const total = breakdown.total;

  const dataURLtoFile = async (dataUrl, filename) => {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    return new File([blob], filename, { type: blob.type });
  };

  const handleSaveImage = async () => {
    if (!receiptRef.current) return;
    setSaving(true);
    try {
      const canvas = await html2canvas(receiptRef.current, { backgroundColor: '#ffffff', scale: 2, useCORS: true });
      const link = document.createElement('a');
      link.download = `${config.brand}-receipt-${order.id}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      if (order.basketPhoto) {
        await new Promise(r => setTimeout(r, 300));
        const link2 = document.createElement('a');
        link2.download = `${config.brand}-basket-${order.id}.jpg`;
        link2.href = order.basketPhoto;
        link2.click();
      }
    } catch (e) { alert('ไม่สามารถบันทึกรูปได้'); }
    setSaving(false);
  };

  const handleShare = async () => {
    if (!receiptRef.current) return;
    setSaving(true);
    try {
      const canvas = await html2canvas(receiptRef.current, { backgroundColor: '#ffffff', scale: 2, useCORS: true });
      const receiptBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      const receiptFile = new File([receiptBlob], `ใบรับงาน-${order.customerName}.png`, { type: 'image/png' });
      const files = [];
      if (order.basketPhoto) {
        const basketFile = await dataURLtoFile(order.basketPhoto, `ตะกร้าผ้า-${order.customerName}.jpg`);
        files.push(basketFile);
      }
      files.push(receiptFile);
      const emoji = config.brand === 'otteri' ? '🦦' : '🐻';
      const text = `${emoji} ${config.name} - รับงานใหม่\n━━━━━━━━━━━\n👤 ${order.customerName}\n📞 ${order.customerPhone}${order.clothCount ? `\n🧺 ${order.clothCount}` : ''}${order.deliveryZone ? `\n🚚 Delivery (${config.deliveryZones.find(z => z.id === order.deliveryZone)?.label})` : ''}${order.fromKev ? '\n👨‍💼 จากเคฟ' : ''}\n💵 ${formatMoney(total)} บาท (${order.paymentMethod === 'transfer' ? 'โอน' : 'เงินสด'})\n⏰ ${formatDate(order.createdAt)}`;
      
      if (navigator.share && navigator.canShare?.({ files })) {
        await navigator.share({ files, title: `${config.name} - ${order.customerName}`, text });
      } else { handleSaveImage(); }

      if (e.name !== 'AbortError') handleSaveImage();

  const headerStripe = config.brand === 'otteri' 
    ? 'repeating-linear-gradient(45deg, #38B6E0, #38B6E0 10px, #5DC5E8 10px, #5DC5E8 20px)'
    : 'repeating-linear-gradient(45deg, #3B82F6, #3B82F6 10px, #93C5FD 10px, #93C5FD 20px)';

  return (
    <div className="min-h-screen bg-slate-100 pb-28">
      <div className="sticky z-20 bg-white border-b border-slate-100 px-5 py-3 flex items-center gap-3" style={{top: '0px'}}>
        <button onClick={onBack} className="flex items-center gap-1 px-3 py-2 -ml-2 rounded-xl active:scale-95 active:bg-slate-100 transition">
          <Icon name="chevron-left" className="w-6 h-6 text-slate-700" />
          <span className="text-sm font-bold text-slate-700">กลับ</span>
        </button>
        <h1 className="font-bold text-slate-900 text-lg flex-1">ใบรับงาน</h1>
      </div>

      <div className="p-4">
        <div ref={receiptRef} className="bg-white rounded-2xl overflow-hidden shadow-lg" style={{fontFamily: '"Noto Sans Thai", sans-serif'}}>
          <div className="relative" style={{ background: config.gradient }}>
            <div className="absolute top-0 left-0 right-0 h-1.5" style={{ background: headerStripe }}></div>
            <div className="px-6 pt-6 pb-5">
              <div className="flex items-center gap-3">
                <div className="bg-white rounded-2xl p-1.5 shadow-md flex-shrink-0">
                  <img src={config.logo} className="w-16 h-16 rounded-xl" alt={config.name} />
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-white text-lg font-extrabold tracking-tight">{config.name}</p>
                  <p className="text-white text-xs font-medium opacity-90">{config.subtitle}</p>

              </div>
              <div className="text-right">

function OwnerLoginView({ config, onBack, onSuccess }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState(false);

  const handleKey = (k) => {
    if (k === 'del') { setPin(p => p.slice(0, -1)); setError(false); return; }
    if (pin.length >= 4) return;
    const newPin = pin + k;
    setPin(newPin); setError(false);
    if (newPin.length === 4) {
      setTimeout(() => {
        if (newPin === OWNER_PASSWORD) onSuccess();
        else { setError(true); setTimeout(() => setPin(''), 800); }
      }, 200);
    }
  };

  return (
    <div className="min-h-screen flex flex-col" style={{ background: 'linear-gradient(135deg, #0c4a6e 0%, #075985 50%, #0369a1 100%)' }}>
      <div className="px-5 py-3 flex items-center">
        <button onClick={onBack} className="flex items-center gap-1 px-3 py-2 -ml-2 rounded-xl active:scale-95 active:bg-white active:bg-opacity-20 transition">
          <Icon name="chevron-left" className="w-6 h-6 text-white" />
          <span className="text-sm font-bold text-white">กลับ</span>
        </button>
      </div>
      <div className="flex-1 flex flex-col items-center justify-center px-8 -mt-12">
        <div className="bg-white rounded-3xl p-2 shadow-2xl mb-6">
          <img src={config.logo} className="w-20 h-20 rounded-2xl" alt={config.name} />
        </div>
        <h1 className="text-white text-2xl font-extrabold mb-1">เจ้าของร้าน {config.name}</h1>
        <p className="text-sky-200 text-sm mb-10">ป้อนรหัส 4 หลัก</p>

        <div className={`flex gap-3 mb-12 ${error ? 'animate-pulse' : ''}`}>
          {[0, 1, 2, 3].map(i => (
            <div key={i} className={`w-4 h-4 rounded-full transition-all ${i < pin.length ? (error ? 'bg-rose-400' : 'bg-white') : 'bg-white bg-opacity-20 border border-white border-opacity-30'}`} />
          ))}
        </div>

        <div className="grid grid-cols-3 gap-3 w-full max-w-xs">
          {[1,2,3,4,5,6,7,8,9].map(n => (
            <button key={n} onClick={() => handleKey(n.toString())} className="aspect-square rounded-2xl bg-white bg-opacity-10 backdrop-blur-sm border border-white border-opacity-20 text-white text-2xl font-bold active:bg-opacity-20 active:scale-95 transition">{n}</button>
          ))}
          <div></div>
          <button onClick={() => handleKey('0')} className="aspect-square rounded-2xl bg-white bg-opacity-10 backdrop-blur-sm border border-white border-opacity-20 text-white text-2xl font-bold active:bg-opacity-20 active:scale-95 transition">0</button>
          <button onClick={() => handleKey('del')} className="aspect-square rounded-2xl bg-white bg-opacity-5 border border-white border-opacity-20 text-white flex items-center justify-center active:bg-opacity-20 active:scale-95 transition">
            <Icon name="chevron-left" className="w-6 h-6" />
          </button>
        </div>
      </div>
    </div>
  );
}

function OwnerDashboardView({ config, orders, collections, onLogout, onSelectOrder, onCollect, onNewOrder, onChangeBrand }) {
  const [tab, setTab] = useState('cash');
  
  const uncollectedCash = orders.filter(o => !o.collected && o.paymentMethod === 'cash');
  const uncollectedTransfer = orders.filter(o => !o.collected && o.paymentMethod === 'transfer');
  
  const todayOrders = orders.filter(o => {
    const d = new Date(o.createdAt); const today = new Date();
    return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
  });
  const todayRevenue = todayOrders.reduce((s, o) => s + calculateTotal(o, config), 0);
  
  const cashPending = uncollectedCash.reduce((s, o) => s + calculateTotal(o, config), 0);
  const transferPending = uncollectedTransfer.reduce((s, o) => s + calculateTotal(o, config), 0);

  const stats = useMemo(() => {
    const phoneMap = new Map();
    orders.forEach(o => {
      const key = o.customerPhone;
      if (!phoneMap.has(key)) phoneMap.set(key, { name: o.customerName, phone: key, count: 0, total: 0 });
      const e = phoneMap.get(key);
      e.count += 1;
      e.total += calculateTotal(o, config);
    });
    const allCustomers = Array.from(phoneMap.values()).sort((a, b) => b.count - a.count);
    const repeatCustomers = allCustomers.filter(c => c.count >= 2);
    const totalRevenue = orders.reduce((s, o) => s + calculateTotal(o, config), 0);
    const cashOrders = orders.filter(o => o.paymentMethod === 'cash');
    const transferOrders = orders.filter(o => o.paymentMethod === 'transfer');
    return {
      uniqueCustomers: allCustomers.length,
      repeatCustomers,
      topCustomers: allCustomers.slice(0, 5),
      totalRevenue,
      cashCount: cashOrders.length,
      transferCount: transferOrders.length,
      cashRevenue: cashOrders.reduce((s, o) => s + calculateTotal(o, config), 0),
      transferRevenue: transferOrders.reduce((s, o) => s + calculateTotal(o, config), 0),
    };
  }, [orders, config]);

  let listToShow = [];
  if (tab === 'cash') listToShow = uncollectedCash;
  else if (tab === 'transfer') listToShow = uncollectedTransfer;
  else if (tab === 'all') listToShow = orders;

  return (
    <div className="min-h-screen bg-slate-100">
      <div className="bg-gradient-to-br from-slate-900 via-slate-800 to-sky-900 px-5 pt-6 pb-8 relative overflow-hidden">
        <div className="absolute -top-10 -right-10 w-40 h-40 rounded-full bg-sky-500 opacity-10"></div>
        <div className="relative">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2">
              <img src={config.logo} className="w-10 h-10 rounded-xl bg-white p-1" alt={config.name} />
              <div>
                <p className="text-sky-300 text-xs tracking-widest uppercase font-bold">Owner • {config.name}</p>
                <h1 className="text-white text-xl font-extrabold">Dashboard</h1>
              </div>
            </div>
            <div className="flex gap-1.5">
              <button onClick={onChangeBrand} className="bg-white bg-opacity-10 backdrop-blur-sm rounded-full px-2.5 py-2 border border-white border-opacity-20 active:scale-95 transition flex items-center gap-1 text-white text-xs">
                <Icon name="repeat" className="w-3 h-3" />
              </button>
              <button onClick={onLogout} className="bg-white bg-opacity-10 backdrop-blur-sm rounded-full px-3 py-2 border border-white border-opacity-20 active:scale-95 transition flex items-center gap-1.5 text-white text-xs">
                <Icon name="log-out" className="w-3 h-3" />ออก
              </button>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2.5">
            <div className="bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl p-3 shadow-lg">
              <div className="flex items-center gap-1.5 mb-1">
                <Icon name="banknote" className="w-4 h-4 text-white" />
                <p className="text-white text-xs font-medium">เงินสด (ต้องไปเก็บ)</p>
              </div>
              <p className="text-white text-2xl font-extrabold">฿{formatMoney(cashPending)}</p>
              <p className="text-emerald-50 text-xs">{uncollectedCash.length} รายการ</p>
              <button onClick={() => onCollect('cash')} disabled={uncollectedCash.length === 0} className={`mt-2 w-full text-xs font-bold rounded-lg py-1.5 transition ${uncollectedCash.length === 0 ? 'bg-white bg-opacity-10 text-emerald-100 opacity-50' : 'bg-white text-emerald-700 active:scale-95'}`}>

function TopUpReportView({ orders, config }) {
  const [period, setPeriod] = useState('today');

  // กรองเฉพาะ order ที่มี top-up
  const allTopUpOrders = orders.filter(o => 
    (o.dryItems || []).some(d => (d.topUp || 0) > 0)
  );

  // กรองตามช่วงเวลา
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  const startOfWeek = (() => {
    const d = new Date(); d.setDate(d.getDate() - 7); d.setHours(0,0,0,0);
    return d.getTime();
  })();

  const filtered = allTopUpOrders.filter(o => {
    if (period === 'today') return o.createdAt >= startOfToday;
    if (period === 'week') return o.createdAt >= startOfWeek;
    if (period === 'month') return o.createdAt >= startOfMonth;
    return true; // all
  });

  // คำนวณยอดรวม
  const totalTopUp = filtered.reduce((sum, o) => 
    sum + (o.dryItems || []).reduce((s, d) => s + (d.topUp || 0), 0), 0
  );

  // แยกตามขนาดเครื่อง
  const bySize = useMemo(() => {
    const map = new Map();
    filtered.forEach(o => {
      (o.dryItems || []).forEach(d => {
        if (!d.topUp) return;
        if (!map.has(d.size)) map.set(d.size, { size: d.size, total: 0, count: 0 });
        const e = map.get(d.size);
        e.total += d.topUp;
        e.count += 1;
      });
    });
    return Array.from(map.values()).sort((a, b) => b.total - a.total);
  }, [filtered]);

  // แยกตามวัน
  const byDay = useMemo(() => {
    const map = new Map();
    filtered.forEach(o => {
      const d = new Date(o.createdAt);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (!map.has(key)) map.set(key, { date: key, total: 0, count: 0, orders: [] });
      const e = map.get(key);
      const orderTopUp = (o.dryItems || []).reduce((s, di) => s + (di.topUp || 0), 0);
      e.total += orderTopUp;
      e.count += 1;
      e.orders.push({ ...o, _topUpAmount: orderTopUp });
    });
    return Array.from(map.values()).sort((a, b) => b.date.localeCompare(a.date));
  }, [filtered]);

  const periodLabels = { today: 'วันนี้', week: '7 วันล่าสุด', month: 'เดือนนี้', all: 'ทั้งหมด' };

  return (
    <div className="space-y-3">
      {/* Period Selector */}
      <div className="bg-white rounded-2xl p-1 flex gap-1 shadow-sm">
        <TabBtn active={period === 'today'} onClick={() => setPeriod('today')}>วันนี้</TabBtn>
        <TabBtn active={period === 'week'} onClick={() => setPeriod('week')}>7 วัน</TabBtn>
        <TabBtn active={period === 'month'} onClick={() => setPeriod('month')}>เดือนนี้</TabBtn>
        <TabBtn active={period === 'all'} onClick={() => setPeriod('all')}>ทั้งหมด</TabBtn>
      </div>

      {/* Summary Card */}
      <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl p-5 text-white shadow-lg">
        <div className="flex items-center gap-2 mb-1">
          <span className="text-2xl">⏱️</span>
          <p className="text-amber-50 text-sm font-bold">ยอดหยอดเพิ่ม • {periodLabels[period]}</p>
        </div>
        <p className="text-4xl font-extrabold">฿{formatMoney(totalTopUp)}</p>
        <div className="flex items-center gap-3 mt-2 text-amber-50 text-xs">
          <span>📋 {filtered.length} ใบ</span>
          <span>•</span>
          <span>🌬️ {bySize.reduce((s, x) => s + x.count, 0)} ครั้ง</span>
        </div>
      </div>

      {/* Empty state */}
      {filtered.length === 0 && (
        <div className="bg-white rounded-2xl p-8 text-center">
          <div className="w-14 h-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center mb-2">
            <span className="text-2xl">⏱️</span>
          </div>
          <p className="text-slate-600 text-sm">ยังไม่มีรายการหยอดเพิ่มในช่วงนี้</p>
        </div>
      )}

      {/* By Machine Size */}
      {bySize.length > 0 && (
        <div className="bg-white rounded-2xl p-4">
          <p className="text-xs text-slate-500 uppercase tracking-wider font-bold mb-3">🌬️ แยกตามขนาดเครื่องอบ</p>
          <div className="space-y-2">
            {bySize.map(item => (
              <div key={item.size} className="flex items-center justify-between bg-amber-50 rounded-xl p-3">
                <div className="flex items-center gap-2">
                  <div className="w-10 h-10 rounded-lg bg-amber-100 flex items-center justify-center">
                    <span className="text-orange-600 font-bold text-sm">{item.size}kg</span>
                  </div>
                  <div>
                    <p className="text-sm font-bold text-slate-900">เครื่องอบ {item.size} kg</p>
                    <p className="text-xs text-slate-500">{item.count} ครั้ง</p>
                  </div>
                </div>
                <p className="font-extrabold text-amber-700">฿{formatMoney(item.total)}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* By Day */}
      {byDay.length > 0 && (
        <div className="bg-white rounded-2xl p-4">
          <p className="text-xs text-slate-500 uppercase tracking-wider font-bold mb-3">📅 แยกตามวัน</p>
          <div className="space-y-3">
            {byDay.map(day => (
              <div key={day.date} className="border-l-4 border-amber-400 pl-3">
                <div className="flex items-center justify-between mb-1">
                  <p className="text-sm font-bold text-slate-900">{day.date}</p>
                  <p className="text-base font-extrabold text-amber-700">฿{formatMoney(day.total)}</p>
                </div>
                <p className="text-xs text-slate-500 mb-1.5">{day.count} ใบ</p>
                <div className="space-y-1">
                  {day.orders.map(o => (
                    <div key={o.id} className="flex items-center justify-between text-xs bg-slate-50 rounded-lg px-2 py-1.5">
                      <span className="text-slate-600 truncate">{o.customerName || '(ไม่ระบุ)'}</span>
                      <span className="font-bold text-amber-700 ml-2">+฿{formatMoney(o._topUpAmount)}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function KevReportView({ orders, config }) {
  const reportRef = useRef(null);
  const [period, setPeriod] = useState('month');
  const [saving, setSaving] = useState(false);
  
  const kevOrders = orders.filter(o => o.fromKev);
  
  // Filter by period
  const now = new Date();
  const filteredOrders = kevOrders.filter(o => {
    const d = new Date(o.createdAt);
    if (period === 'today') {
      return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }
    if (period === 'month') {
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }
    return true; // all
  });
  
  // Group by date
  const ordersByDate = useMemo(() => {
    const map = new Map();
    filteredOrders.forEach(o => {
      const d = new Date(o.createdAt);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(o);
    });
    return Array.from(map.entries()).sort((a, b) => b[0].localeCompare(a[0]));
  }, [filteredOrders]);
  
  const totalRevenue = filteredOrders.reduce((s, o) => s + calculateTotal(o, config), 0);
  const totalDelivery = filteredOrders.reduce((s, o) => {
    const breakdown = calculateBreakdown(o, config);
    return s + breakdown.deliveryTotal;
  }, 0);
  
  // คำนวณค่าตอบแทน: 100 งาน = 1000 บาท / ขั้นต่ำ
  const orderCount = filteredOrders.length;
  const tier = Math.floor(orderCount / 100);
  const kevPay = tier * 1000;
  const remaining = 100 - (orderCount % 100);
  const nextTierPay = (tier + 1) * 1000;
  
  const periodLabel = period === 'today' ? 'วันนี้' : period === 'month' ? `เดือนนี้ (${now.getMonth()+1}/${now.getFullYear()})` : 'ทั้งหมด';
  
  const dataURLtoFile = async (dataUrl, filename) => {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    return new File([blob], filename, { type: blob.type });
  };
  
  const handleShareKev = async () => {
    if (!reportRef.current) return;
    setSaving(true);
    try {
      const canvas = await html2canvas(reportRef.current, { backgroundColor: '#ffffff', scale: 2, useCORS: true });
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      const file = new File([blob], `เคฟ-สรุป-${periodLabel}.png`, { type: 'image/png' });
      
      const text = `👨‍💼 สรุปงานเคฟ - ${periodLabel}\n━━━━━━━━━━━\n📦 จำนวนงาน: ${orderCount} งาน\n💰 ยอดรวม: ฿${formatMoney(totalRevenue)}\n🚚 ค่าส่ง: ฿${formatMoney(totalDelivery)}\n━━━━━━━━━━━\n💵 ค่าตอบแทน: ฿${formatMoney(kevPay)}${remaining < 100 && remaining > 0 ? `\n📈 อีก ${remaining} งาน = ฿${formatMoney(nextTierPay)}` : ''}`;
      
      if (navigator.share && navigator.canShare?.({ files: [file] })) {
        await navigator.share({ files: [file], title: `สรุปเคฟ ${periodLabel}`, text });
      } else {
        const link = document.createElement('a');
        link.download = `kev-report-${periodLabel}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    } catch (e) {
      if (e.name !== 'AbortError') console.error(e);
    }
    setSaving(false);
  };
  
  return (
    <div className="space-y-3">
      {/* Period selector */}
      <div className="bg-white rounded-2xl p-1 flex gap-1 shadow-sm">
        <button onClick={() => setPeriod('today')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${period === 'today' ? 'bg-purple-600 text-white' : 'text-slate-600'}`}>วันนี้</button>
        <button onClick={() => setPeriod('month')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${period === 'month' ? 'bg-purple-600 text-white' : 'text-slate-600'}`}>เดือนนี้</button>

        <div className="bg-gradient-to-br from-purple-500 to-purple-700 px-5 py-5 text-white">

      </div>

      {/* Action button */}
      <button onClick={handleShareKev} disabled={saving || orderCount === 0} className={`w-full py-3 rounded-2xl font-bold text-white flex items-center justify-center gap-2 active:scale-95 transition ${orderCount === 0 ? 'bg-slate-300' : ''}`} style={orderCount > 0 ? {background: 'linear-gradient(135deg, #06C755, #00B900)'} : {}}>
        <span className="text-xl">📤</span>
        <span>ส่งสรุปให้เคฟทาง Line</span>
      </button>
    </div>
  );
}

function CollectionHistory({ collections }) {
  if (collections.length === 0) {
    return (<div className="bg-white rounded-2xl p-8 text-center mt-2"><p className="text-slate-600 text-sm">ยังไม่มีประวัติเก็บเงิน</p></div>);
  }
  return (
    <div className="space-y-2">
      {collections.map((c, i) => (
        <div key={c.id} className="bg-white rounded-2xl p-4 shadow-sm">
          <div className="flex items-center justify-between mb-2">
            <div>
              <p className="text-xs text-slate-500">{formatDate(c.collectedAt)}</p>
              <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${c.method === 'transfer' ? 'bg-violet-100 text-violet-700' : 'bg-emerald-100 text-emerald-700'}`}>
                {c.method === 'transfer' ? '💳 เคลียร์ยอดโอน' : '💵 เก็บเงินสด'}
              </span>
            </div>
            <span className="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-full font-bold">รอบ {collections.length - i}</span>
          </div>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div className="bg-slate-50 rounded-xl py-2">
              <p className="text-xs text-slate-500">รายการ</p>
              <p className="font-bold text-slate-900">{c.orderCount}</p>
            </div>
            <div className="bg-emerald-50 rounded-xl py-2">
              <p className="text-xs text-emerald-600">รับมา</p>
              <p className="font-bold text-emerald-700">฿{formatMoney(c.totalReceived)}</p>
            </div>
            <div className="bg-sky-50 rounded-xl py-2">
              <p className="text-xs text-sky-600">ควรได้</p>
              <p className="font-bold text-sky-700">฿{formatMoney(c.totalShould)}</p>
            </div>
          </div>
          {c.totalReceived !== c.totalShould && (
            <div className={`mt-2 text-center text-xs font-semibold ${c.totalReceived > c.totalShould ? 'text-amber-700' : 'text-rose-700'}`}>
              {c.totalReceived > c.totalShould ? `เกิน ${formatMoney(c.totalReceived - c.totalShould)} บาท` : `ขาด ${formatMoney(c.totalShould - c.totalReceived)} บาท`}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}


function Section({ iconName, title, children }) {
  return (
    <div className="bg-white rounded-2xl p-4 shadow-sm">
      <div className="flex items-center gap-2 mb-3">
        <div className="w-7 h-7 rounded-lg bg-sky-100 text-sky-600 flex items-center justify-center">
          <Icon name={iconName} className="w-4 h-4" />
        </div>
        <h3 className="font-bold text-slate-900">{title}</h3>
      </div>
      <div className="space-y-3">{children}</div>
    </div>
  );
}

function Field({ label, required, children }) {
  return (
    <div>
      <label className="block text-xs font-medium text-slate-600 mb-1.5">{label}{required && <span className="text-rose-500 ml-0.5">*</span>}</label>
      {children}
    </div>
  );
}

function MachineRow({ size, count, price, qty, onAdd, onRemove, color }) {
  const isActive = qty > 0;
  const bgClass = color === 'sky' ? 'bg-sky-500' : 'bg-orange-500';
  return (
    <div className={`rounded-xl p-3 transition ${isActive ? 'bg-gradient-to-r from-slate-50 to-slate-100 border-2 border-slate-300' : 'bg-slate-50 border-2 border-transparent'}`}>
      <div className="flex items-center justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-1.5">
            <span className="font-bold text-slate-900 text-lg">{size}</span>
            <span className="text-slate-500 text-xs">kg</span>
            <span className="text-slate-400 text-xs ml-2">มี {count} เครื่อง</span>
          </div>
          <p className="text-sm text-slate-600">฿{price} / ครั้ง</p>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={onRemove} disabled={qty === 0} className={`w-9 h-9 rounded-full flex items-center justify-center transition ${qty === 0 ? 'bg-slate-200 text-slate-400' : 'bg-white border-2 border-slate-300 text-slate-700 active:scale-90'}`}>
            <Icon name="minus" className="w-4 h-4" strokeWidth={3} />
          </button>
          <span className={`w-8 text-center font-extrabold text-lg ${isActive ? 'text-slate-900' : 'text-slate-400'}`}>{qty}</span>
          <button onClick={onAdd} className={`w-9 h-9 rounded-full flex items-center justify-center text-white shadow-md active:scale-90 transition ${bgClass}`}>
            <Icon name="plus" className="w-4 h-4" strokeWidth={3} />
          </button>
        </div>
      </div>
    </div>
  );
}

function WashMachineRow({ machine, hasMultipleTemps, getQty, washItems, onUpdate }) {
  const totalQty = (washItems || []).filter(i => i.size === machine.size).reduce((s, i) => s + i.qty, 0);
  const isActive = totalQty > 0;
  
  if (!hasMultipleTemps) {
    // Single price - show as MachineRow
    return (
      <MachineRow size={machine.size} count={machine.count} price={machine.prices.cold} qty={getQty(washItems, machine.size, 'cold')} onAdd={() => onUpdate('cold', 1)} onRemove={() => onUpdate('cold', -1)} color="sky" />
    );
  }
  
  // Multi-temp - show 3 buttons
  return (
    <div className={`rounded-xl p-3 transition ${isActive ? 'bg-gradient-to-r from-slate-50 to-slate-100 border-2 border-slate-300' : 'bg-slate-50 border-2 border-transparent'}`}>
      <div className="flex items-baseline gap-1.5 mb-2">
        <span className="font-bold text-slate-900 text-lg">{machine.size}</span>
        <span className="text-slate-500 text-xs">kg</span>
        <span className="text-slate-400 text-xs ml-2">มี {machine.count} เครื่อง</span>
      </div>
      <div className="space-y-1.5">
        {[
          { key: 'cold', label: '❄️ น้ำเย็น', color: 'bg-sky-500' },
          { key: 'warm', label: '🌤️ น้ำอุ่น', color: 'bg-amber-500' },
          { key: 'hot', label: '🔥 น้ำร้อน', color: 'bg-rose-500' },
        ].map(t => {
          const q = getQty(washItems, machine.size, t.key);
          const active = q > 0;
          return (
            <div key={t.key} className={`flex items-center justify-between p-2 rounded-lg ${active ? 'bg-white shadow-sm' : ''}`}>
              <div className="flex-1">
                <span className="text-sm font-semibold text-slate-700">{t.label}</span>
                <span className="text-xs text-slate-500 ml-2">฿{machine.prices[t.key]}</span>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => onUpdate(t.key, -1)} disabled={q === 0} className={`w-7 h-7 rounded-full flex items-center justify-center transition ${q === 0 ? 'bg-slate-200 text-slate-400' : 'bg-white border border-slate-300 text-slate-700 active:scale-90'}`}>
                  <Icon name="minus" className="w-3 h-3" strokeWidth={3} />
                </button>
                <span className={`w-6 text-center font-bold text-sm ${active ? 'text-slate-900' : 'text-slate-400'}`}>{q}</span>
                <button onClick={() => onUpdate(t.key, 1)} className={`w-7 h-7 rounded-full flex items-center justify-center text-white shadow active:scale-90 transition ${t.color}`}>
                  <Icon name="plus" className="w-3 h-3" strokeWidth={3} />
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CounterRow({ iconEmoji, label, sublabel, unit, qty, onAdd, onRemove, colorActive, hint }) {
  const isActive = qty > 0;
  return (
    <div className={`rounded-xl p-3 transition border-2 ${isActive ? 'bg-slate-50 border-slate-300' : 'bg-slate-50 border-transparent'}`}>
      <div className="flex items-center justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-1.5">
            <span className="text-lg">{iconEmoji}</span>
            <span className={`font-bold text-sm ${isActive ? 'text-slate-900' : 'text-slate-700'}`}>{label}</span>
          </div>
          <p className="text-xs text-slate-500">{sublabel}</p>
          {hint && <p className="text-xs text-amber-600 mt-0.5">{hint}</p>}
        </div>
        <div className="flex items-center gap-2">
          <button onClick={onRemove} disabled={qty === 0} className={`w-9 h-9 rounded-full flex items-center justify-center transition ${qty === 0 ? 'bg-slate-200 text-slate-400' : 'bg-white border-2 border-slate-300 text-slate-700 active:scale-90'}`}>
            <Icon name="minus" className="w-4 h-4" strokeWidth={3} />
          </button>
          <div className="flex flex-col items-center min-w-[40px]">
            <span className={`text-center font-extrabold text-lg ${isActive ? 'text-slate-900' : 'text-slate-400'}`}>{qty}</span>
            <span className="text-xs text-slate-400 -mt-1">{unit}</span>
          </div>
          <button onClick={onAdd} className={`w-9 h-9 rounded-full flex items-center justify-center text-white shadow-md active:scale-90 transition ${colorActive}`}>
            <Icon name="plus" className="w-4 h-4" strokeWidth={3} />
          </button>
        </div>
      </div>
    </div>
  );
}

function TabBtn({ active, onClick, children }) {
  return (
    <button onClick={onClick} className={`py-2 px-3 rounded-xl text-xs font-bold transition whitespace-nowrap flex-shrink-0 ${active ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600'}`}>{children}</button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
